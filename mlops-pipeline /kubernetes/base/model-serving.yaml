---
apiVersion: v1
kind: Namespace
metadata:
  name: mlops-prod
  labels:
    environment: prod
    app.kubernetes.io/managed-by: helm
    istio-injection: enabled

---
# ── Model Serving Deployment ──────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-model-server
  namespace: mlops-prod
  labels:
    app.kubernetes.io/name: ai-model-server
    app.kubernetes.io/component: model-serving
    company: people-inc
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: ai-model-server
  template:
    metadata:
      labels:
        app.kubernetes.io/name: ai-model-server
        app.kubernetes.io/version: "latest"
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8000"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: model-server-sa
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: ai-model-server
          image: "ACCOUNT.dkr.ecr.us-east-1.amazonaws.com/ai-model-server:latest"
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
              name: http
          env:
            - name: MLFLOW_TRACKING_URI
              value: "http://mlflow.mlops-prod.svc.cluster.local:5000"
            - name: MODEL_NAME
              valueFrom:
                configMapKeyRef:
                  name: model-config
                  key: model_name
            - name: MODEL_STAGE
              value: "Production"
            - name: AWS_DEFAULT_REGION
              value: "us-east-1"
          envFrom:
            - secretRef:
                name: model-server-secrets
          resources:
            requests:
              cpu: "500m"
              memory: "1Gi"
            limits:
              cpu: "2000m"
              memory: "4Gi"
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 15
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /ready
              port: 8000
            initialDelaySeconds: 20
            periodSeconds: 10
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: tmp
              mountPath: /tmp
            - name: model-cache
              mountPath: /app/model_cache
      volumes:
        - name: tmp
          emptyDir: {}
        - name: model-cache
          emptyDir:
            sizeLimit: 5Gi
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: role
                    operator: In
                    values: ["model-serving"]
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchLabels:
                  app.kubernetes.io/name: ai-model-server
              topologyKey: kubernetes.io/hostname
      tolerations:
        - key: workload
          operator: Equal
          value: model-serving
          effect: NoSchedule

---
# ── HPA ───────────────────────────────────────────────────────
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: ai-model-server-hpa
  namespace: mlops-prod
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: ai-model-server
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80

---
# ── Service ───────────────────────────────────────────────────
apiVersion: v1
kind: Service
metadata:
  name: ai-model-server
  namespace: mlops-prod
  labels:
    app.kubernetes.io/name: ai-model-server
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: ai-model-server
  ports:
    - name: http
      port: 80
      targetPort: 8000

---
# ── MLflow Tracking Server ────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mlflow
  namespace: mlops-prod
  labels:
    app.kubernetes.io/name: mlflow
    app.kubernetes.io/component: tracking
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: mlflow
  template:
    metadata:
      labels:
        app.kubernetes.io/name: mlflow
    spec:
      containers:
        - name: mlflow
          image: ghcr.io/mlflow/mlflow:2.9.2
          command:
            - mlflow
            - server
            - --backend-store-uri
            - postgresql://mlflow:$(DB_PASSWORD)@$(DB_HOST):5432/mlflow
            - --default-artifact-root
            - s3://people-inc-model-artifacts/mlflow
            - --host
            - "0.0.0.0"
            - --port
            - "5000"
          ports:
            - containerPort: 5000
              name: http
          env:
            - name: DB_HOST
              valueFrom:
                secretKeyRef:
                  name: mlflow-secrets
                  key: db_host
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mlflow-secrets
                  key: db_password
            - name: AWS_DEFAULT_REGION
              value: "us-east-1"
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "1000m"
              memory: "1Gi"
          livenessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 30
            periodSeconds: 20

---
apiVersion: v1
kind: Service
metadata:
  name: mlflow
  namespace: mlops-prod
spec:
  selector:
    app.kubernetes.io/name: mlflow
  ports:
    - port: 5000
      targetPort: 5000

---
# ── GPU Training Job (Kubeflow Pipeline step) ─────────────────
apiVersion: batch/v1
kind: Job
metadata:
  name: model-training-job
  namespace: mlops-prod
  labels:
    app.kubernetes.io/component: training
spec:
  ttlSecondsAfterFinished: 3600
  backoffLimit: 2
  template:
    spec:
      restartPolicy: OnFailure
      tolerations:
        - key: "nvidia.com/gpu"
          operator: Equal
          value: "true"
          effect: NoSchedule
      nodeSelector:
        role: gpu-training
      containers:
        - name: trainer
          image: "ACCOUNT.dkr.ecr.us-east-1.amazonaws.com/ai-model-server:latest"
          command: ["python3", "scripts/mlops/train.py"]
          args:
            - "--model-name=$(MODEL_NAME)"
            - "--mlflow-uri=http://mlflow.mlops-prod.svc.cluster.local:5000"
            - "--s3-bucket=people-inc-model-artifacts"
            - "--experiment-name=people-inc-$(MODEL_NAME)"
          env:
            - name: MODEL_NAME
              valueFrom:
                configMapKeyRef:
                  name: model-config
                  key: model_name
            - name: AWS_DEFAULT_REGION
              value: "us-east-1"
          resources:
            requests:
              cpu: "2000m"
              memory: "8Gi"
              nvidia.com/gpu: "1"
            limits:
              cpu: "4000m"
              memory: "16Gi"
              nvidia.com/gpu: "1"
